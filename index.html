<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS · Мультиплатформенный ассистент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0b0f16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .assistant-container {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #00aeff;
            border-radius: 40px;
            padding: 24px;
            box-shadow: 0 0 50px #00aeff40, inset 0 0 20px #00aeff20;
            color: #e0f0ff;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #00aeff;
            text-shadow: 0 0 20px #0077ff;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #0e1a26;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 25px;
            border: 1px solid #2f6080;
        }
        .led {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 15px #f44;
            transition: 0.2s;
        }
        .led.awake {
            background: #44ff44;
            box-shadow: 0 0 25px #4f4;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        .status-text {
            font-size: 1.2rem;
            font-weight: 400;
            color: #c0e4ff;
        }
        .mic-button {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: radial-gradient(circle at 30% 30%, #1f3d5a, #0a1a2a);
            border: 3px solid #00aeff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 40px #00aeff;
            transition: 0.2s;
        }
        .mic-button:active {
            transform: scale(0.94);
            box-shadow: 0 0 60px #2db9ff;
        }
        .mic-button svg {
            width: 45px;
            height: 45px;
            fill: white;
            filter: drop-shadow(0 0 8px #00aeff);
        }
        .log-area {
            background: #0b1825;
            border-radius: 24px;
            padding: 18px;
            border: 1px solid #2b6c9e;
            margin-bottom: 25px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-title {
            font-size: 1.1rem;
            color: #8ccbff;
            border-bottom: 1px solid #2b6c9e;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .log-messages {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        .log-item {
            padding: 3px 0;
            border-bottom: 1px dotted #1e4a6e;
            word-break: break-word;
        }
        .log-item.user {
            color: #ffd966;
        }
        .log-item.jarvis {
            color: #5cd6ff;
        }
        .apps-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .app-chip {
            background: #0e2133;
            border: 1px solid #0af7;
            color: #c1e2ff;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 2px 10px #00000070;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.2s;
        }
        .app-chip:hover {
            background: #1a3a55;
            border-color: #0af;
        }
        .footer {
            font-size: 0.8rem;
            color: #3d6b8f;
            text-align: center;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="assistant-container">
        <div class="header">
            <h1>J.A.R.V.I.S</h1>
        </div>

        <div class="status-row">
            <div class="led" id="ledIndicator"></div>
            <div class="status-text" id="statusMessage">Скажите «Джарвис»</div>
        </div>

        <div class="mic-button" id="micButton">
            <svg viewBox="0 0 24 24">
                <path d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7C7,13.76 9.24,16 12,16C14.76,16 17,13.76 17,11H19Z"/>
            </svg>
        </div>

        <div class="log-area">
            <div class="log-title">📋 Журнал</div>
            <div class="log-messages" id="logMessages">
                <div class="log-item jarvis">[SYSTEM] Загружен, жду команду...</div>
            </div>
        </div>

        <div class="apps-grid">
            <span class="app-chip" data-app="youtube">YouTube</span>
            <span class="app-chip" data-app="instagram">Instagram</span>
            <span class="app-chip" data-app="telegram">Telegram</span>
            <span class="app-chip" data-app="vk">VK</span>
            <span class="app-chip" data-app="tiktok">TikTok</span>
            <span class="app-chip" data-app="google">Google</span>
        </div>

        <div class="footer">
            🎤 активация: «Джарвис» | команды: время, дата, открой YouTube, поиск котики, шутку, стоп
        </div>
    </div>

    <script>
        (function() {
            // ======================== КОНФИГУРАЦИЯ ========================
            const WAKE_WORD = 'джарвис';                // ключевое слово
            const LISTEN_TIMEOUT = 60000;               // 60 секунд бездействия → сон
            const APP_URLS = {
                youtube: 'https://youtube.com',
                instagram: 'https://instagram.com',
                telegram: 'https://web.telegram.org',
                vk: 'https://vk.com',
                tiktok: 'https://tiktok.com',
                google: 'https://google.com'
            };

            // ======================== DOM ЭЛЕМЕНТЫ ========================
            const led = document.getElementById('ledIndicator');
            const statusEl = document.getElementById('statusMessage');
            const logDiv = document.getElementById('logMessages');
            const micBtn = document.getElementById('micButton');
            const appChips = document.querySelectorAll('.app-chip');

            // ======================== СОСТОЯНИЕ ========================
            let isAwake = false;                // true = режим приёма команд
            let sleepTimer = null;
            let recognition = null;
            let synthesis = window.speechSynthesis;
            let micPermission = false;
            let forcedStop = false;

            // ======================== ЛОГИРОВАНИЕ ========================
            function addLog(text, type = 'jarvis') {
                const item = document.createElement('div');
                item.className = `log-item ${type}`;
                const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                item.textContent = `[${time}] ${text}`;
                logDiv.appendChild(item);
                logDiv.scrollTop = logDiv.scrollHeight;
                while (logDiv.children.length > 150) {
                    logDiv.removeChild(logDiv.children[0]);
                }
                console.log(`[${type}] ${text}`);
            }

            // ======================== ГОЛОСОВОЙ ВЫВОД (мужской) ========================
            function speak(text) {
                if (!synthesis) {
                    addLog('Синтез речи недоступен', 'error');
                    return;
                }
                synthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.95;
                utterance.pitch = 0.9;

                const voices = synthesis.getVoices();
                if (voices.length > 0) {
                    let maleVoice = voices.find(v => 
                        v.lang.includes('ru') && 
                        (v.name.toLowerCase().includes('mikhail') ||
                         v.name.toLowerCase().includes('pavel') ||
                         v.name.toLowerCase().includes('male') ||
                         v.name.toLowerCase().includes('мужской'))
                    );
                    if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('ru'));
                    if (maleVoice) utterance.voice = maleVoice;
                }

                utterance.onstart = () => addLog('🗣️ ' + text, 'jarvis');
                utterance.onerror = (e) => addLog('Ошибка речи: ' + e.error, 'error');
                synthesis.speak(utterance);
            }

            // ======================== ОБНОВЛЕНИЕ UI ========================
            function setAwake(state) {
                isAwake = state;
                if (state) {
                    led.classList.add('awake');
                    statusEl.textContent = '👂 Слушаю команду...';
                } else {
                    led.classList.remove('awake');
                    statusEl.textContent = '😴 Скажите «Джарвис»';
                }
            }

            // ======================== ТАЙМЕР СНА ========================
            function resetSleepTimer() {
                if (sleepTimer) clearTimeout(sleepTimer);
                if (isAwake) {
                    sleepTimer = setTimeout(() => {
                        setAwake(false);
                        addLog('🔴 Уснул по таймауту (60 сек)', 'jarvis');
                    }, LISTEN_TIMEOUT);
                }
            }

            // ======================== ОТКРЫТИЕ ПРИЛОЖЕНИЙ ========================
            function openApp(appName) {
                const url = APP_URLS[appName];
                if (url) {
                    window.open(url, '_blank');
                    speak(`Открываю ${appName}`);
                } else {
                    speak(`Не знаю приложение ${appName}`);
                }
            }

            // ======================== ОБРАБОТКА КОМАНД ========================
            function processCommand(rawText) {
                if (!rawText) return;
                const cmd = rawText.toLowerCase().trim();
                addLog('👤 ' + rawText, 'user');

                // Пробуждение
                if (!isAwake) {
                    if (cmd.includes(WAKE_WORD)) {
                        setAwake(true);
                        resetSleepTimer();
                        speak('Слушаю, сэр.');
                    }
                    return;
                }

                // Сброс таймера при любой команде
                resetSleepTimer();

                // Команда "стоп"
                if (cmd.includes('стоп') || cmd.includes('хватит') || cmd.includes('замолчи')) {
                    setAwake(false);
                    speak('Отключаюсь.');
                    return;
                }

                // ВРЕМЯ
                if (cmd.includes('время') || cmd.includes('который час')) {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    speak(`Сейчас ${timeStr}`);
                }
                // ДАТА
                else if (cmd.includes('дата') || cmd.includes('сегодня') || cmd.includes('какое число')) {
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
                    speak(`Сегодня ${dateStr}`);
                }
                // ОТКРЫТЬ YOUTUBE
                else if (cmd.includes('ютуб') || (cmd.includes('открой') && cmd.includes('youtube'))) {
                    openApp('youtube');
                }
                // INSTAGRAM
                else if (cmd.includes('инстаграм') || cmd.includes('instagram')) {
                    openApp('instagram');
                }
                // TELEGRAM
                else if (cmd.includes('телеграм') || cmd.includes('telegram')) {
                    openApp('telegram');
                }
                // VK
                else if (cmd.includes('вк') || cmd.includes('вконтакте') || cmd.includes('vk')) {
                    openApp('vk');
                }
                // TIKTOK
                else if (cmd.includes('тикток') || cmd.includes('tiktok')) {
                    openApp('tiktok');
                }
                // GOOGLE (поиск или открыть)
                else if (cmd.includes('гугл') || cmd.includes('google')) {
                    // если есть поисковый запрос
                    let query = cmd.replace(/открой|google|гугл/gi, '').trim();
                    if (query && !query.includes('открой')) {
                        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                        speak(`Ищу ${query}`);
                    } else {
                        openApp('google');
                    }
                }
                // ПОИСК (общий)
                else if (cmd.includes('найди') || cmd.includes('поиск')) {
                    let query = cmd.replace(/найди|поиск/gi, '').trim();
                    if (query) {
                        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                        speak(`Ищу ${query}`);
                    } else {
                        speak('Что найти?');
                    }
                }
                // ПОГОДА (имитация)
                else if (cmd.includes('погода')) {
                    let city = 'Москва';
                    const match = cmd.match(/в\s+([а-яё\s-]+)/i);
                    if (match) city = match[1].trim();
                    speak(`В ${city} сейчас +17, небольшая облачность. (тестовый режим)`);
                }
                // ШУТКА
                else if (cmd.includes('шутку') || cmd.includes('анекдот')) {
                    const jokes = [
                        'Почему программисты любят темноту? Потому что свет привлекает баги.',
                        'Что сказал один байт другому? Ты глянь, нас опять соединяют в пакеты!',
                        'Как программисты моют посуду? Они запускают мойку и пока она работает, пьют кофе.',
                        'Сколько программистов нужно, чтобы вкрутить лампочку? Ни одного, это проблема железа.'
                    ];
                    speak(jokes[Math.floor(Math.random() * jokes.length)]);
                }
                // ЧТО УМЕЕШЬ
                else if (cmd.includes('что ты умеешь') || cmd.includes('помощь')) {
                    speak('Я могу сказать время, дату, открыть YouTube, Instagram, Telegram, VK, TikTok, Google, найти информацию, рассказать шутку, сказать погоду. Скажите «стоп» для отключения.');
                }
                // НЕИЗВЕСТНО
                else {
                    speak('Не понял команду, сэр.');
                }
            }

            // ======================== ИНИЦИАЛИЗАЦИЯ SPEECH RECOGNITION ========================
            function initRecognition() {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRec) {
                    addLog('❌ Браузер не поддерживает распознавание речи', 'error');
                    statusEl.textContent = 'Не поддерживается';
                    return null;
                }

                const rec = new SpeechRec();
                rec.continuous = false;
                rec.interimResults = false;
                rec.lang = 'ru-RU';

                rec.onstart = () => addLog('🎤 Микрофон активирован', 'jarvis');
                rec.onresult = (e) => processCommand(e.results[0][0].transcript);
                rec.onerror = (e) => {
                    addLog('Ошибка микрофона: ' + e.error, 'error');
                    if (e.error === 'not-allowed') {
                        micPermission = false;
                        statusEl.textContent = '❌ Нет доступа к микрофону';
                    }
                };
                rec.onend = () => {
                    if (micPermission && !forcedStop) {
                        try { rec.start(); } catch (e) {}
                    }
                };
                return rec;
            }

            // ======================== ЗАПРОС МИКРОФОНА ========================
            function requestMicrophone() {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                        micPermission = true;
                        forcedStop = false;
                        addLog('✅ Микрофон доступен. Скажите «Джарвис»', 'jarvis');
                        statusEl.textContent = '✅ Микрофон готов';
                        if (recognition) {
                            try { recognition.start(); } catch (e) {}
                        }
                    })
                    .catch(err => {
                        micPermission = false;
                        addLog('❌ Нет доступа к микрофону: ' + err.message, 'error');
                        statusEl.textContent = '❌ Нет микрофона';
                    });
            }

            // ======================== НАЖАТИЕ НА КНОПКУ ========================
            micBtn.addEventListener('click', () => {
                if (!micPermission) {
                    requestMicrophone();
                } else {
                    // ручная активация
                    if (!isAwake) {
                        setAwake(true);
                        resetSleepTimer();
                        speak('Слушаю, сэр.');
                    } else {
                        speak('Я здесь, сэр.');
                    }
                }
            });

            // ======================== КЛИК ПО ЧИПАМ ПРИЛОЖЕНИЙ ========================
            appChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const app = chip.dataset.app;
                    openApp(app);
                });
            });

            // ======================== ПРЕДЗАГРУЗКА ГОЛОСОВ ========================
            if (synthesis) {
                synthesis.getVoices();
                if (synthesis.onvoiceschanged) {
                    synthesis.onvoiceschanged = () => {};
                }
            }

            // ======================== СТАРТ ========================
            recognition = initRecognition();
            // сразу запрашиваем микрофон (для удобства)
            requestMicrophone();

            // начальное состояние
            setAwake(false);
        })();
    </script>
</body>
</html>
