<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>J.A.R.V.I.S</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .jarvis-core {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0c10;
            position: relative;
        }

        /* Танҳо ном, бе тугма */
        .jarvis-name {
            font-family: 'Segoe UI', 'Arial Black', 'Impact', sans-serif;
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 900;
            color: #00aeff;
            text-shadow: 0 0 40px #006eff, 2px 2px 10px black;
            letter-spacing: 0.15em;
            transform: skew(-2deg);
            white-space: nowrap;
            padding: 0 0.2em;
            animation: glow 3s infinite ease-in-out;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 40px #006eff, 2px 2px 10px black; }
            50% { text-shadow: 0 0 70px #00aeff, 2px 2px 15px black; }
            100% { text-shadow: 0 0 40px #006eff, 2px 2px 10px black; }
        }

        /* Индикатор ҳолат (нури хурд дар поён) */
        .status-led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 20px #f44;
            margin-top: 30px;
            transition: 0.2s;
        }

        .status-led.awake {
            background: #44ff44;
            box-shadow: 0 0 30px #4f4;
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Паёми пинҳон барои корбар (ҳангоми зарурат) */
        .hidden-message {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #3a6a8f;
            font-family: monospace;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="jarvis-core">
        <div class="jarvis-name">J.A.R.V.I.S</div>
        <div class="status-led" id="statusLed"></div>
        <div class="hidden-message" id="statusMessage">инициализация...</div>
    </div>

    <script>
        (function() {
            // ======================== КОНФИГУРАЦИЯ ========================
            const WAKE_WORD = 'джарвис';
            const LISTEN_TIMEOUT = 60000; // 60 секунд

            // ======================== ЭЛЕМЕНТЫ ========================
            const led = document.getElementById('statusLed');
            const statusMsg = document.getElementById('statusMessage');

            // ======================== СОСТОЯНИЕ ========================
            let isAwake = false;
            let sleepTimer = null;
            let recognition = null;
            let synthesis = window.speechSynthesis;
            let micPermission = false;
            let currentVolume = 1.0;

            // ======================== ЛОГИРОВАНИЕ (дар консоль) ========================
            function log(msg, type = 'info') {
                console.log(`%cJARVIS: ${msg}`, 'color: #0af');
                // инчунин метавонем паёми пинҳонро навсозӣ кунем
                statusMsg.textContent = msg;
            }

            // ======================== ГОЛОСОВОЙ ВЫВОД ========================
            function speak(text) {
                if (!synthesis) {
                    log('Синтез речи недоступен', 'error');
                    return;
                }
                synthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.95;
                utterance.pitch = 0.9;
                utterance.volume = currentVolume;

                const voices = synthesis.getVoices();
                if (voices.length) {
                    let maleVoice = voices.find(v => 
                        v.lang.includes('ru') && 
                        (v.name.toLowerCase().includes('mikhail') ||
                         v.name.toLowerCase().includes('pavel') ||
                         v.name.toLowerCase().includes('male') ||
                         v.name.toLowerCase().includes('мужской'))
                    );
                    if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('ru'));
                    if (maleVoice) utterance.voice = maleVoice;
                }

                utterance.onstart = () => log(`Ответ: ${text}`);
                utterance.onerror = (e) => log(`Ошибка речи: ${e.error}`, 'error');
                synthesis.speak(utterance);
            }

            // ======================== УПРАВЛЕНИЕ ГРОМКОСТЬЮ ========================
            function setVolume(level) {
                if (level < 0) level = 0;
                if (level > 1) level = 1;
                currentVolume = level;
                log(`Громкость ${Math.round(level*100)}%`);
                speak(`Громкость ${Math.round(level*100)} процентов`);
            }

            // ======================== ОБНОВЛЕНИЕ UI ========================
            function setAwake(state) {
                isAwake = state;
                if (state) {
                    led.classList.add('awake');
                } else {
                    led.classList.remove('awake');
                }
            }

            // ======================== ТАЙМЕР СНА ========================
            function resetSleepTimer() {
                if (sleepTimer) clearTimeout(sleepTimer);
                if (isAwake) {
                    sleepTimer = setTimeout(() => {
                        setAwake(false);
                        log('Уснул по таймауту');
                    }, LISTEN_TIMEOUT);
                }
            }

            // ======================== ОБРАБОТКА КОМАНД ========================
            function processCommand(rawText) {
                if (!rawText) return;
                const cmd = rawText.toLowerCase().trim();
                log(`Распознано: "${rawText}"`);

                // Пробуждение
                if (!isAwake) {
                    if (cmd.includes(WAKE_WORD)) {
                        setAwake(true);
                        resetSleepTimer();
                        speak('Слушаю, сэр.');
                    }
                    return;
                }

                // Сброс таймера
                resetSleepTimer();

                // Стоп
                if (cmd.includes('стоп') || cmd.includes('хватит') || cmd.includes('замолчи')) {
                    setAwake(false);
                    speak('Отключаюсь.');
                    return;
                }

                // Громкость
                if (cmd.includes('громче')) {
                    let newVol = currentVolume + 0.1;
                    if (newVol > 1) newVol = 1;
                    setVolume(newVol);
                    return;
                }
                if (cmd.includes('тише')) {
                    let newVol = currentVolume - 0.1;
                    if (newVol < 0) newVol = 0;
                    setVolume(newVol);
                    return;
                }
                if (cmd.includes('громкость')) {
                    const match = cmd.match(/(\d{1,3})/);
                    if (match) {
                        let val = parseInt(match[1], 10);
                        if (val >= 0 && val <= 100) {
                            setVolume(val / 100);
                        } else {
                            speak('Громкость от 0 до 100');
                        }
                    } else {
                        speak(`Сейчас громкость ${Math.round(currentVolume*100)}%`);
                    }
                    return;
                }

                // Время
                if (cmd.includes('время') || cmd.includes('который час')) {
                    const now = new Date();
                    const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    speak(`Сейчас ${time}`);
                }
                // Дата
                else if (cmd.includes('дата') || cmd.includes('сегодня') || cmd.includes('какое число')) {
                    const now = new Date();
                    const date = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
                    speak(`Сегодня ${date}`);
                }
                // YouTube
                else if (cmd.includes('ютуб') || (cmd.includes('открой') && cmd.includes('youtube'))) {
                    window.open('https://youtube.com', '_blank');
                    speak('Открываю YouTube');
                }
                // Instagram
                else if (cmd.includes('инстаграм') || cmd.includes('instagram')) {
                    window.open('https://instagram.com', '_blank');
                    speak('Открываю Instagram');
                }
                // Telegram
                else if (cmd.includes('телеграм') || cmd.includes('telegram')) {
                    window.open('https://web.telegram.org', '_blank');
                    speak('Открываю Telegram');
                }
                // VK
                else if (cmd.includes('вк') || cmd.includes('вконтакте') || cmd.includes('vk')) {
                    window.open('https://vk.com', '_blank');
                    speak('Открываю VK');
                }
                // TikTok
                else if (cmd.includes('тикток') || cmd.includes('tiktok')) {
                    window.open('https://tiktok.com', '_blank');
                    speak('Открываю TikTok');
                }
                // Google / поиск
                else if (cmd.includes('гугл') || cmd.includes('google') || cmd.includes('найди') || cmd.includes('поиск')) {
                    let query = cmd.replace(/открой|гугл|google|найди|поиск/gi, '').trim();
                    if (query) {
                        window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
                        speak(`Ищу ${query}`);
                    } else {
                        window.open('https://google.com', '_blank');
                        speak('Открываю Google');
                    }
                }
                // Погода (имитация)
                else if (cmd.includes('погода')) {
                    let city = 'Москва';
                    const match = cmd.match(/в\s+([а-яё\s-]+)/i);
                    if (match) city = match[1].trim();
                    speak(`В ${city} сейчас +15, переменная облачность. (тест)`);
                }
                // Шутка
                else if (cmd.includes('шутку') || cmd.includes('анекдот')) {
                    const jokes = [
                        'Почему программисты любят темноту? Потому что свет привлекает баги.',
                        'Что сказал один байт другому? Ты глянь, нас опять соединяют в пакеты!',
                        'Сколько программистов нужно, чтобы вкрутить лампочку? Ни одного, это проблема железа.'
                    ];
                    speak(jokes[Math.floor(Math.random() * jokes.length)]);
                }
                // Что умеешь
                else if (cmd.includes('что ты умеешь') || cmd.includes('помощь')) {
                    speak('Я могу сказать время, дату, открыть YouTube, Instagram, Telegram, VK, TikTok, Google, найти информацию, рассказать шутку, сказать погоду, управлять громкостью. Скажите "стоп" для отключения.');
                }
                else {
                    speak('Не понял команду, сэр.');
                }
            }

            // ======================== НАСТРОЙКА РАСПОЗНАВАНИЯ ========================
            function initRecognition() {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRec) {
                    log('Браузер не поддерживает распознавание', 'error');
                    return null;
                }

                const rec = new SpeechRec();
                rec.continuous = false;
                rec.interimResults = false;
                rec.lang = 'ru-RU';

                rec.onstart = () => log('Микрофон слушает');
                rec.onresult = (e) => processCommand(e.results[0][0].transcript);
                rec.onerror = (e) => log(`Ошибка микрофона: ${e.error}`, 'error');
                rec.onend = () => {
                    if (micPermission) {
                        try { rec.start(); } catch (e) {}
                    }
                };
                return rec;
            }

            // ======================== ЗАПРОС МИКРОФОНА ========================
            function requestMic() {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        stream.getTracks().forEach(t => t.stop());
                        micPermission = true;
                        log('Микрофон доступен. Скажите "Джарвис"');
                        if (recognition) {
                            try { recognition.start(); } catch (e) {}
                        }
                    })
                    .catch(err => {
                        micPermission = false;
                        log('Нет доступа к микрофону', 'error');
                    });
            }

            // ======================== ИНИЦИАЛИЗАЦИЯ ========================
            recognition = initRecognition();
            if (synthesis) {
                synthesis.getVoices();
                if (synthesis.onvoiceschanged) synthesis.onvoiceschanged = () => {};
            }

            // Автоматически запрашиваем микрофон при загрузке
            requestMic();

            // Начальное состояние
            setAwake(false);
        })();
    </script>
</body>
</html>
